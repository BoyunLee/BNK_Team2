spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test

crypto:
  secret-key: dGVzdGtleTF0ZXN0a2V5MnRlc3RrZXkzdGVzdGtleTQ=

logging:
  level:
    com.busanbank.loan: WARN
    org.springframework.security: WARN
