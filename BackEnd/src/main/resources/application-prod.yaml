# 배포용 프로파일. 실행: java -jar app.jar --spring.profiles.active=prod
# 민감 정보는 환경변수로 주입한다. (코드/저장소에 평문 비밀번호 금지)
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
  thymeleaf:
    cache: true

logging:
  level:
    root: info
