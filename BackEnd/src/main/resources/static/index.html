<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNK 대출 신청</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F0F4FF;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;display:flex;justify-content:center;min-height:100vh}
#app{width:100%;max-width:430px;background:#fff;min-height:100vh;display:flex;flex-direction:column;box-shadow:0 0 20px rgba(0,0,0,.1)}
.header{display:flex;align-items:center;padding:16px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px 4px 0;color:#333;line-height:1}
.header-title{flex:1;text-align:center;font-size:17px;font-weight:600;color:#111}
.header-spacer{width:40px}
.content{flex:1;padding:24px 20px;overflow-y:auto}
.bottom{padding:16px 20px;background:#fff;border-top:1px solid #eee}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary{background:#0052CC;color:#fff}
.btn-primary:hover{background:#003D99}
.btn-primary:disabled{background:#B0C4E8;cursor:not-allowed}
.btn-secondary{background:#F0F4FF;color:#0052CC;border:1.5px solid #0052CC;margin-top:10px}
.btn-danger{background:#CC2200;color:#fff}
.form-group{margin-bottom:18px}
.label{display:block;font-size:14px;font-weight:500;color:#555;margin-bottom:7px}
.input{width:100%;padding:14px;border:1.5px solid #DDE3ED;border-radius:10px;font-size:15px;color:#111;outline:none;transition:border .2s}
.input:focus{border-color:#0052CC}
.input[readonly]{background:#F8F9FB;color:#888}
.select{width:100%;padding:14px;border:1.5px solid #DDE3ED;border-radius:10px;font-size:15px;color:#111;outline:none;background:#fff;appearance:none}
.err{background:#FFF0F0;color:#CC0000;padding:12px;border-radius:8px;font-size:14px;margin:0 20px 12px;border:1px solid #FFCCCC}
.info-box{background:#F0F4FF;border-radius:12px;padding:16px;margin-bottom:18px;font-size:14px;color:#444;line-height:1.6}
.sub{font-size:14px;color:#666;margin-bottom:20px;line-height:1.5}
.card{border:1.5px solid #DDE3ED;border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.card:hover,.card.sel{border-color:#0052CC;background:#F0F4FF}
.card-title{font-size:15px;font-weight:600;color:#111;margin-bottom:4px}
.card-sub{font-size:13px;color:#666}
.row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #F0F0F0;font-size:14px}
.row:last-child{border-bottom:none}
.rk{color:#666}
.rv{color:#111;font-weight:500;text-align:right}
.rv.blue{color:#0052CC;font-weight:700}
.rv.green{color:#00875A;font-weight:700}
.big-check{width:80px;height:80px;background:#00875A;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.done-title{text-align:center;font-size:22px;font-weight:700;color:#111;margin-bottom:8px}
.done-sub{text-align:center;font-size:14px;color:#666;margin-bottom:24px}
.doc-box{background:#F8F9FB;border:1px solid #DDE3ED;border-radius:10px;padding:16px;font-size:13px;color:#333;line-height:1.8;margin-bottom:18px;white-space:pre-line;max-height:200px;overflow-y:auto}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid #F0F0F0;cursor:pointer}
.chk-row:last-child{border-bottom:none}
.chk-row input[type=checkbox]{width:20px;height:20px;accent-color:#0052CC;flex-shrink:0;margin-top:2px;cursor:pointer}
.chk-label{font-size:14px;color:#333;line-height:1.5}
.big-amt{text-align:center;font-size:44px;font-weight:800;color:#0052CC;margin:20px 0 6px;letter-spacing:-1px}
.big-amt-label{text-align:center;font-size:14px;color:#666;margin-bottom:24px}
.toggle-group{display:flex;border:1.5px solid #DDE3ED;border-radius:10px;overflow:hidden;margin-bottom:18px}
.toggle-btn{flex:1;padding:12px;background:#fff;border:none;font-size:14px;font-weight:500;cursor:pointer;color:#555;transition:all .2s}
.toggle-btn.on{background:#0052CC;color:#fff}
.mydata-card{background:#F0F4FF;border-radius:12px;padding:16px;margin-bottom:12px}
.mydata-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;border-bottom:1px solid #DDE3ED}
.mydata-row:last-child{border-bottom:none}
.ok{color:#00875A;font-weight:700}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.6);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.rate-big{font-size:22px;font-weight:700;color:#0052CC}
.section{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
.terms-box{background:#F8F9FB;border:1px solid #DDE3ED;border-radius:8px;padding:14px;font-size:12px;color:#555;line-height:1.8;max-height:150px;overflow-y:auto;white-space:pre-line;margin-bottom:14px}
.link-btn{background:none;border:none;color:#0052CC;font-size:14px;cursor:pointer;text-decoration:underline}
.tag{display:inline-block;background:#F0F4FF;color:#0052CC;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:600;margin-left:6px}
.warn-box{background:#FFF8E6;border:1px solid #FFD54F;border-radius:8px;padding:12px;font-size:13px;color:#795600;line-height:1.5;margin-bottom:18px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:24px 20px;width:100%;max-width:360px}
.modal-title{font-size:17px;font-weight:700;color:#111;margin-bottom:8px;text-align:center}
.modal-body{font-size:14px;color:#555;line-height:1.6;text-align:center;margin-bottom:20px}
.modal-btn-group{display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div class="header" v-if="step !== 'REGISTER_DONE' && step !== 'LOAN_DONE'">
    <button class="back-btn" @click="goBack" v-if="hist.length > 0">←</button>
    <div v-else style="width:40px"></div>
    <div class="header-title">{{ title }}</div>
    <div class="header-spacer"></div>
  </div>

  <!-- 에러 메시지 -->
  <div class="err" v-if="err">{{ err }}</div>

  <!-- 이어하기 모달 -->
  <div class="overlay" v-if="showResumeModal">
    <div class="modal">
      <div class="modal-title">진행 중인 대출 신청이 있습니다</div>
      <div class="modal-body">
        <strong>{{ inProgressLoan ? inProgressLoan.productName : '' }}</strong><br>
        {{ inProgressLoan ? inProgressLoan.statusName : '' }} 단계에서 중단되었습니다.<br><br>
        이어서 작성하시겠습니까?
      </div>
      <div class="modal-btn-group">
        <button class="btn btn-primary" @click="doResumeLoan" :disabled="loading">
          <span class="spinner" v-if="loading"></span>{{ loading ? '불러오는 중...' : '이어서 작성하기' }}
        </button>
        <button class="btn btn-secondary" @click="doStartFresh" :disabled="loading">새로 시작하기 (기존 신청 취소)</button>
        <button class="link-btn" style="text-align:center;padding:8px" @click="showResumeModal=false">닫기</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       1. 이메일 인증
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_EMAIL'">
    <div class="content">
      <div class="sub">본인 이메일을 입력해 주세요.</div>
      <div class="form-group">
        <label class="label">이메일</label>
        <input class="input" type="email" v-model="s.email" placeholder="example@email.com" @keyup.enter="sendCode">
      </div>
      <div style="text-align:center;margin-top:16px">
        <button class="link-btn" @click="go('LOGIN')">이미 계정이 있으신가요? 로그인</button>
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="sendCode" :disabled="loading">
        <span class="spinner" v-if="loading"></span>{{ loading ? '처리 중...' : '인증코드 발송' }}
      </button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       2. 인증코드 확인
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_EMAIL_VERIFY'">
    <div class="content">
      <div class="info-box">{{ s.email }}으로 인증코드를 발송했습니다.<br>5분 내 입력해 주세요.</div>
      <div class="form-group">
        <label class="label">인증코드 (6자리)</label>
        <input class="input" type="text" v-model="f.code" placeholder="000000" maxlength="6" inputmode="numeric" @keyup.enter="verifyCode">
      </div>
      <div style="text-align:center;margin-top:8px">
        <button class="link-btn" @click="sendCode">인증코드 재발송</button>
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="verifyCode" :disabled="loading">
        <span class="spinner" v-if="loading"></span>{{ loading ? '처리 중...' : '확인' }}
      </button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       3. 기본정보 입력
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_BASIC'">
    <div class="content">
      <div class="form-group">
        <label class="label">이름</label>
        <input class="input" type="text" v-model="s.name" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label class="label">휴대전화번호</label>
        <input class="input" type="tel" v-model="s.phoneNo" placeholder="010-1234-5678" maxlength="13" @input="fmtPhone">
      </div>
      <div class="form-group">
        <label class="label">생년월일</label>
        <input class="input" type="text" v-model="s.birthDate" placeholder="YYYY-MM-DD" maxlength="10" inputmode="numeric" @input="fmtBirth">
      </div>
      <div class="form-group">
        <label class="label">주소</label>
        <input class="input" type="text" v-model="s.address" placeholder="부산시 중구 중앙대로 123">
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="go('REGISTER_SIMPLE_PWD')">다음</button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       4. 간편인증 비밀번호 설정
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_SIMPLE_PWD'">
    <div class="content">
      <div class="info-box">로그인 및 본인인증에 사용합니다.</div>
      <div class="form-group">
        <label class="label">간편인증 비밀번호 (6자리)</label>
        <input class="input" type="password" v-model="f.p1" placeholder="••••••" maxlength="6" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="label">비밀번호 확인</label>
        <input class="input" type="password" v-model="f.p2" placeholder="••••••" maxlength="6" inputmode="numeric" @keyup.enter="setSimplePwd">
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="setSimplePwd">다음</button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       5. 계좌 비밀번호 설정
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_ACCOUNT_PWD'">
    <div class="content">
      <div class="info-box">입출금 계좌 비밀번호입니다.</div>
      <div class="form-group">
        <label class="label">계좌 비밀번호 (4자리)</label>
        <input class="input" type="password" v-model="f.a1" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="label">비밀번호 확인</label>
        <input class="input" type="password" v-model="f.a2" placeholder="••••" maxlength="4" inputmode="numeric" @keyup.enter="setAccountPwd">
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="setAccountPwd">다음</button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       6. 전자서명 비밀번호 설정
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_SIGN_PWD'">
    <div class="content">
      <div class="info-box">전자서명 시 사용합니다.</div>
      <div class="form-group">
        <label class="label">전자서명 비밀번호 (6자리)</label>
        <input class="input" type="password" v-model="f.s1" placeholder="••••••" maxlength="6" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="label">비밀번호 확인</label>
        <input class="input" type="password" v-model="f.s2" placeholder="••••••" maxlength="6" inputmode="numeric" @keyup.enter="doRegister">
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="doRegister" :disabled="loading">
        <span class="spinner" v-if="loading"></span>{{ loading ? '처리 중...' : '가입하기' }}
      </button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       7. 회원가입 완료
  ══════════════════════════════════════ -->
  <template v-if="step === 'REGISTER_DONE'">
    <div style="padding:60px 20px 24px;display:flex;flex-direction:column;align-items:center;flex:1">
      <div class="big-check">
        <svg viewBox="0 0 24 24" fill="none" width="40" height="40">
          <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-title">{{ s.name }}님 환영합니다!</div>
      <div class="done-sub">회원가입이 완료되었습니다.</div>
      <div class="info-box" style="width:100%;text-align:center">
        <div style="font-size:13px;color:#888;margin-bottom:4px">자동 생성된 입출금 계좌번호</div>
        <div style="font-size:20px;font-weight:700;color:#0052CC;letter-spacing:1px">{{ fmtAccount(s.accountNo) }}</div>
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="go('LOGIN')">로그인하기</button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       8. 로그인
  ══════════════════════════════════════ -->
  <template v-if="step === 'LOGIN'">
    <div class="content">
      <div style="text-align:center;margin-bottom:36px;padding-top:20px">
        <div style="font-size:36px;font-weight:800;color:#0052CC">BNK</div>
        <div style="font-size:14px;color:#888;margin-top:6px">부산은행 비대면 대출</div>
      </div>
      <div class="form-group">
        <label class="label">이메일</label>
        <input class="input" type="email" v-model="s.email" placeholder="example@email.com" @keyup.enter="doLogin">
      </div>
      <div class="form-group">
        <label class="label">간편인증 비밀번호</label>
        <input class="input" type="password" v-model="s.simplePassword" placeholder="••••••" maxlength="6" inputmode="numeric" @keyup.enter="doLogin">
      </div>
      <div style="text-align:center;margin-top:16px">
        <button class="link-btn" @click="go('REGISTER_EMAIL')">계정이 없으신가요? 회원가입</button>
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="doLogin" :disabled="loading">
        <span class="spinner" v-if="loading"></span>{{ loading ? '처리 중...' : '로그인' }}
      </button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       9. 대출 상품 선택
  ══════════════════════════════════════ -->
  <template v-if="step === 'PRODUCT_LIST'">
    <div class="content">
      <div class="sub">신청 가능한 대출상품을 선택하세요.</div>
      <div v-if="loading" style="text-align:center;padding:40px;color:#888">상품 불러오는 중...</div>
      <div v-for="p in s.products" :key="p.productId" class="card" @click="selectProduct(p)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div class="card-title">{{ p.productName }}</div>
            <div class="card-sub" style="margin-top:6px">대출기간: {{ p.loanPeriod }}</div>
          </div>
          <div style="text-align:right;margin-left:12px">
            <div class="rate-big">{{ p.baseRate }}%</div>
            <div style="font-size:11px;color:#888">기준금리</div>
          </div>
        </div>
      </div>
      <div v-if="!loading && s.products.length === 0" class="info-box" style="text-align:center;color:#888">
        판매 중인 상품이 없습니다.
      </div>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       10. 대출 신청 확인
  ══════════════════════════════════════ -->
  <template v-if="step === 'LOAN_APPLY_CONFIRM'">
    <div class="content">
      <div class="sub">선택하신 상품을 확인해 주세요.</div>
      <div class="card sel" v-if="s.selectedProduct">
        <div class="card-title" style="font-size:17px;margin-bottom:12px">{{ s.selectedProduct.productName }}</div>
        <div class="row"><span class="rk">기준금리</span><span class="rv blue">{{ s.selectedProduct.baseRate }}%</span></div>
        <div class="row"><span class="rk">대출기간</span><span class="rv">{{ s.selectedProduct.loanPeriod }}</span></div>
      </div>
      <div v-if="inProgressLoans.length > 0"
           style="background:#FFF0F0;border:1.5px solid #FFCCCC;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#CC2200">
        ⚠️ 진행 중인 신청서가 있습니다.<br>
        신청하면 <strong>이어하기 또는 취소 여부</strong>를 선택할 수 있습니다.
      </div>
      <div class="warn-box">신청 버튼을 누르면 대출 신청서가 채번 등록됩니다.<br>신청서는 <strong>1일간</strong> 유효합니다.</div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="applyLoan" :disabled="loading">
        <span class="spinner" v-if="loading"></span>{{ loading ? '처리 중...' : '신청하기' }}
      </button>
    </div>
  </template>

  <!-- ══════════════════════════════════════
       11. 적합성·적정성 확인서
  ══════════════════════════════════════ -->
  <template v-if="step === 'SUITABILITY_FORM'">
    <div class="content">
      <div class="sub">고객정보 확인서를 작성해 주세요.</div>
      <div class="form-group">
        <label class="label">대출 목적</label>
        <select class="select" v-model="f.loanPurpose">
          <option value="생활비">생활비</option>
          <option value="사업자금">사업자금</option>
          <option value="주택구입">주택구입</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label">상환 방법</label>
        <select class="select" v-model="f.repayMethod">
          <option value="원리금균등">원리금균등</option>
          <option value="원금균등">원금균등</option>
          <option value="만기일시">만기일시</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label">자산 규모</label>
        <select class="select" v-model="f.assetScale">
          <option value="1억 이하">1억 이하</option>
          <option value="1억~3억">1억~3억</option>
          <option value="3억~5억">3억~5억</option>
          <option value="5억 초과">5억 초과</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label">연간 소득</label>

                    style="width:100%;box-sizing:border-box;border:1.5px solid #DDE3ED;border-radius:10px;padding:10px;font-size:13px;color:#111;resize:vertical;min-height:72px;outline:none;font-family:inherit;line-height:1.5"

          <button class="btn btn-secondary" style="padding:10px;font-size:13px;margin-top:6px"
                  @click="manualSaveSummary(p.productId, p.manualText)"
                  :disabled="!p.manualText || p.loading">
            저장
          </button>

        <!-- 결과 메시지 -->

             :style="p.resultOk
               ? 'background:#F0FFF4;border:1px solid #B7EBCE;color:#00875A'
               : 'background:#FFF0F0;border:1px solid #FFCCCC;color:#CC0000'"

  <!-- ══════════════════════════════════════

        <svg viewBox="0 0 24 24" fill="none" width="40" height="40">
          <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-title">대출 실행 완료!</div>
      <div class="done-sub">지정 계좌로 대출금이 입금되었습니다.</div>
      <div class="card" style="width:100%;cursor:default;border-color:#0052CC" v-if="s.execResult">
        <div class="row"><span class="rk">대출번호</span><span class="rv" style="font-size:13px">{{ s.execResult.loanAccountNo }}</span></div>
        <div class="row"><span class="rk">대출금액</span><span class="rv blue">{{ fmtMoney(s.execResult.loanAmount) }}</span></div>
        <div class="row"><span class="rk">적용금리</span><span class="rv blue">{{ s.execResult.finalRate }}%</span></div>
        <div class="row"><span class="rk">만기일</span><span class="rv">{{ s.execResult.maturityDate }}</span></div>
        <div class="row"><span class="rk">입금계좌</span><span class="rv">{{ fmtAccount(s.execResult.depositAccountNo) }}</span></div>
        <div class="row"><span class="rk">실행일시</span><span class="rv" style="font-size:13px">{{ s.execResult.executionDate }}</span></div>
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary" @click="goToMyPage">내 계좌 확인</button>
      <button class="btn btn-secondary" style="margin-top:10px" @click="resetAll">처음으로 (로그아웃)</button>
    </div>
  </template>

</div>

<script>
const { createApp, ref, reactive, computed } = Vue;
axios.defaults.withCredentials = true;

createApp({
  setup() {
    const step = ref('REGISTER_EMAIL');
    const hist = ref([]);
    const err  = ref('');
    const loading = ref(false);
    const showResumeModal = ref(false);
    const inProgressLoan  = ref(null);

    // 전역 상태
    const s = reactive({
      email: '', name: '', phoneNo: '', birthDate: '', address: '',
      simplePassword: '', accountPassword: '', signaturePassword: '',
      customerId: null, accountNo: '',
      products: [], selectedProduct: null,
      loanAccountNo: '', expireAt: '',
      tokenId: '',
      maxLimitAmt: 0, appliedBaseRate: 0, screeningResult: '',
      mydataResult: null,
      productDescriptions: [], preferentialRates: [],
      confirmData: null, execResult: null,
      myAccount: null, myLoans: [], loanDetail: null,
      adminProducts: [],
    });

    // 폼 로컬 상태
    const f = reactive({
      code: '', p1: '', p2: '', a1: '', a2: '', s1: '', s2: '',
      verifyPwd: '', certPwd: '', finalPwd: '',
      consent1: true, consent2: true,
      docAdminAgree: false, docPersonalAgree: false,
      mobileTerms: false,
      signType: 'COMMON_CERT',
      loanPurpose: '생활비', repayMethod: '원리금균등', assetScale: '1억 이하', annualIncome: '3천~5천만원',
      companyName: '', jobType: '금융업', employmentType: '정규직', incomeMan: 4500,
      termProduct: false, termDesc: false, termBond: false,
      repaymentType: '원리금균등',
      prefIds: [],
      loanAmtMan: 1000, rateTypeCode: 'F', rateChangeCycle: '6개월', loanPeriod: '36개월',
      fundPurpose: '생활비',
    });

    const titles = {
      REGISTER_EMAIL: '이메일 인증', REGISTER_EMAIL_VERIFY: '인증코드 확인',
      REGISTER_BASIC: '기본정보 입력', REGISTER_SIMPLE_PWD: '간편비밀번호 설정',
      REGISTER_ACCOUNT_PWD: '계좌비밀번호 설정', REGISTER_SIGN_PWD: '전자서명비밀번호 설정',
      MY_PAGE: '홈', MY_LOANS: '내 대출 현황', LOAN_DETAIL: '대출 상세',
      AI_SUMMARY_ADMIN: 'AI 요약 관리',
      LOGIN: '로그인', PRODUCT_LIST: '대출상품 선택', LOAN_APPLY_CONFIRM: '대출 신청',
      SUITABILITY_FORM: '적합성·적정성 확인서', VERIFY_SUITABILITY: '본인인증',
      SUITABILITY_DONE: '확인 완료', MYDATA_CONSENT: '마이데이터 이용 동의',
      DOC_ADMIN_VIEW: '행정정보 제공 요구서', DOC_ADMIN_AGREE: '행정정보 제공 요구서',
      DOC_PERSONAL_VIEW: '개인신용정보 동의서', DOC_PERSONAL_AGREE: '개인신용정보 동의서',
      PRE_SIGN: '전자서명', MOBILE_AUTH_TERMS: '휴대폰 본인인증 약관',
      TOKEN_SELECT: '인증수단 선택', TOKEN_CERT_PWD: '전자서명',
      INCOME_INPUT: '직장·소득정보 입력', MYDATA_VIEW: '공공마이데이터 확인',
      BETTER_LIMIT: '더 높은 한도', SCREENING_RESULT: '대출 한도 조회 결과',
      PRODUCT_DESC_1: '금융상품 중요사항 설명', PRODUCT_DESC_2: '금융상품 중요사항 설명',
      CONTRACT_TERMS_1: '약관 확인 및 동의', CONTRACT_TERMS_2: '약관 상세 내용',
      REPAYMENT_METHOD: '상환방식 선택', PREFERENTIAL_SELECT: '우대금리 선택',
      LOAN_CONDITIONS: '대출 조건 입력', DEPOSIT_INFO: '입금계좌 및 자금용도',
      CONFIRM_INFO: '신청정보 확인', CONTRACT_SIGN: '본인확인',
      BOND_CONTRACT: '채권서류 전자약정', FINAL_AUTH: '최종 본인인증',
    };
    const title = computed(() => titles[step.value] || '');
    const inProgressLoans = computed(() => s.myLoans.filter(l => isInProgress(l.statusCode)));

    function go(s2) { hist.value.push(step.value); step.value = s2; err.value = ''; }
    function goBack() { if (hist.value.length) { step.value = hist.value.pop(); err.value = ''; } }

    function setErr(e) {
      const msg = e?.response?.data?.message || e?.response?.data?.code || e?.message || '오류가 발생했습니다.';
      err.value = msg;
    }

    function fmtPhone() {
      const v = s.phoneNo.replace(/\D/g, '');
      if (v.length <= 3) s.phoneNo = v;
      else if (v.length <= 7) s.phoneNo = v.slice(0,3)+'-'+v.slice(3);
      else s.phoneNo = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
    }
    function fmtBirth() {
      const v = s.birthDate.replace(/\D/g, '');
      if (v.length <= 4) s.birthDate = v;
      else if (v.length <= 6) s.birthDate = v.slice(0,4)+'-'+v.slice(4);
      else s.birthDate = v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6,8);
    }
    function fmtAccount(no) {
      if (!no) return '';
      const v = no.replace(/-/g,'');
      if (v.length >= 10) return v.slice(0,3)+'-'+v.slice(3,6)+'-'+v.slice(6);
      return no;
    }
    function fmtMoney(amt) {
      if (!amt && amt !== 0) return '0원';
      const n = Number(amt);
      if (n >= 100000000) return (n/100000000).toFixed(n%100000000===0?0:1)+'억원';
      if (n >= 10000) return Math.floor(n/10000).toLocaleString()+'만원';
      return n.toLocaleString()+'원';
    }
    function calcPrefSum() {
      if (!s.preferentialRates || !f.prefIds.length) return 0;
      const sum = s.preferentialRates.filter(r=>f.prefIds.includes(r.preferentialId)).reduce((a,r)=>a+parseFloat(r.rateValue),0);
      return sum.toFixed(2);
    }
    function togglePref(id) {
      const i = f.prefIds.indexOf(id);
      if (i >= 0) f.prefIds.splice(i,1); else f.prefIds.push(id);
    }

    // ── API 함수들 ──────────────────────────────

    async function sendCode() {
      if (!s.email) { err.value='이메일을 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post('/api/v1/auth/email/send', { email: s.email });
        go('REGISTER_EMAIL_VERIFY');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function verifyCode() {
      if (!f.code) { err.value='인증코드를 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post('/api/v1/auth/email/verify', { email: s.email, code: f.code });
        f.code = '';
        go('REGISTER_BASIC');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    function setSimplePwd() {
      if (!f.p1 || f.p1.length < 6) { err.value='6자리를 입력해 주세요'; return; }
      if (f.p1 !== f.p2) { err.value='비밀번호가 일치하지 않습니다'; return; }
      s.simplePassword = f.p1; f.p1=''; f.p2='';
      go('REGISTER_ACCOUNT_PWD');
    }

    function setAccountPwd() {
      if (!f.a1 || f.a1.length < 4) { err.value='4자리를 입력해 주세요'; return; }
      if (f.a1 !== f.a2) { err.value='비밀번호가 일치하지 않습니다'; return; }
      s.accountPassword = f.a1; f.a1=''; f.a2='';
      go('REGISTER_SIGN_PWD');
    }

    async function doRegister() {
      if (!f.s1 || f.s1.length < 6) { err.value='6자리를 입력해 주세요'; return; }
      if (f.s1 !== f.s2) { err.value='비밀번호가 일치하지 않습니다'; return; }
      s.signaturePassword = f.s1; f.s1=''; f.s2='';
      loading.value = true; err.value = '';
      try {
        const res = await axios.post('/api/v1/auth/register', {
          name: s.name, phoneNo: s.phoneNo, birthDate: s.birthDate,
          address: s.address, email: s.email,
          simplePassword: s.simplePassword, accountPassword: s.accountPassword,
          signaturePassword: s.signaturePassword,
        });
        s.customerId = res.data.data.customerId;
        s.accountNo  = res.data.data.accountNo;
        go('REGISTER_DONE');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function doLogin() {
      if (!s.email || !s.simplePassword) { err.value='이메일과 비밀번호를 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        const res = await axios.post('/api/v1/auth/login', { email: s.email, simplePassword: s.simplePassword });
        const d = res.data.data;
        s.customerId = d.customer.customerId;
        s.accountNo  = d.accountNo;
        s.name       = d.customer.name;
        hist.value = [];
        go('MY_PAGE');
        loadMyPage();
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    // ── 날짜 포맷 (yyyy-MM-ddTHH:mm:ss → MM-dd HH:mm)
    function fmtDateShort(dt) {
      if (!dt) return '-';
      return dt.toString().slice(0,16).replace('T', ' ');
    }

    // ── 상태 배지 스타일
    function statusBadgeStyle(code) {
      const map = {
        '9': 'background:#E6F4EA;color:#1B7F3B',
        'X': 'background:#F5F5F5;color:#888',
        'R': 'background:#FFF0F0;color:#CC2200',
      };
      return map[code] || 'background:#EEF3FF;color:#0052CC';
    }

    // ── 홈 로드 (계좌 + 대출 목록 동시)
    async function loadMyPage() {
      try {
        const [acctRes, loansRes] = await Promise.all([
          axios.get('/api/v1/customers/me/account'),
          axios.get('/api/v1/customers/me/loans'),
        ]);
        s.myAccount = acctRes.data.data;
        s.myLoans   = loansRes.data.data || [];
      } catch(e) { setErr(e); }
    }

    // ── 내 대출 목록
    async function loadMyLoans() {
      loading.value = true; err.value = '';
      try {
        const res = await axios.get('/api/v1/customers/me/loans');
        s.myLoans = res.data.data || [];
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    // ── 대출 상세
    async function loadLoanDetail(loanAccountNo) {
      loading.value = true; err.value = '';
      try {
        const res = await axios.get(`/api/v1/customers/me/loans/${loanAccountNo}`);
        s.loanDetail = res.data.data;
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    // ── 네비게이션 헬퍼
    function goToMyPage() {
      hist.value = [];
      step.value = 'MY_PAGE';
      err.value = '';
      loadMyPage();
    }

    function goToApply() {
      go('PRODUCT_LIST');
      loadProducts();
    }

    function goToMyLoans() {
      go('MY_LOANS');
      loadMyLoans();
    }

    async function goToLoanDetail(loanAccountNo) {
      s.loanDetail = null;
      go('LOAN_DETAIL');
      await loadLoanDetail(loanAccountNo);
    }

    // ── 진행 중 여부 판단
    function isInProgress(code) {
      return !['9','X','R'].includes(code);
    }

    // ── statusCode → 재진입 화면 매핑
    const RESUME_STEP = {
      '1': 'SUITABILITY_FORM',
      '2': 'MYDATA_CONSENT',
      '3': 'DOC_ADMIN_VIEW',
      '4': 'MOBILE_AUTH_TERMS',
      '5': 'MYDATA_VIEW',
      '6': 'PRODUCT_DESC_1',
      '7': 'CONFIRM_INFO',
      '8': 'BOND_CONTRACT',
    };

    // ── 상품 정보 복원 (이어하기 공통)
    async function restoreProduct(productId) {
      const res = await axios.get(`/api/v1/products/${productId}`);
      const p = res.data.data;
      s.selectedProduct   = p;
      s.preferentialRates = p.preferentialRates || [];
    }

    // ── 이어하기 실제 수행 (loan 객체 받아서 화면 복원)
    async function resumeLoanTo(loan) {
      loading.value = true; err.value = '';
      try {
        s.loanAccountNo = loan.loanAccountNo;
        await restoreProduct(loan.productId);

        const code = loan.statusCode;
        const target = RESUME_STEP[code] || 'SUITABILITY_FORM';

        // 추가 데이터 복원 (statusCode에 따라)
        if (code === '5') {
          const r = await axios.get(`/api/v1/loans/applications/${loan.loanAccountNo}/mydata`);
          s.mydataResult = r.data.data;
        }
        if (code === '6' || code === '7') {
          const r = await axios.get(`/api/v1/loans/applications/${loan.loanAccountNo}/screening`);
          s.maxLimitAmt     = r.data.data.maxLimitAmt;
          s.appliedBaseRate = r.data.data.appliedBaseRate;
          s.screeningResult = r.data.data.result;
        }
        if (code === '7') {
          const r = await axios.get(`/api/v1/loans/applications/${loan.loanAccountNo}/contract/confirm`);
          s.confirmData = r.data.data;
        }
        if (code === '6') {
          const r = await axios.get(`/api/v1/products/${loan.productId}/descriptions`);
          s.productDescriptions = r.data.data || [];
        }

        hist.value = ['MY_PAGE'];
        step.value = target;
        err.value = '';
        showResumeModal.value = false;
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    // ── 모달: 이어서 작성하기 클릭
    async function doResumeLoan() {
      if (!inProgressLoan.value) return;
      await resumeLoanTo(inProgressLoan.value);
    }

    // ── 모달: 새로 시작하기 클릭 (취소 후 재신청)
    async function doStartFresh() {
      if (!inProgressLoan.value) return;
      loading.value = true; err.value = '';
      try {
        await axios.patch(`/api/v1/loans/applications/${inProgressLoan.value.loanAccountNo}/cancel`);
        showResumeModal.value = false;
        inProgressLoan.value = null;
        // 상품 선택 후 재신청
        await applyLoan();
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    // ── 목록에서 직접 이어하기
    async function doResumeLoanDirect(loan) {
      await resumeLoanTo(loan);
    }

    // ── AI 요약 관리 ────────────────────────────────────────

    async function goToAiSummaryAdmin() {
      go('AI_SUMMARY_ADMIN');
      await loadAdminProducts();
    }

    async function loadAdminProducts() {
      loading.value = true; err.value = '';
      try {
        const res = await axios.get('/api/v1/admin/products');
        const all = res.data.data || [];

        // 각 상품의 현재 AI_SUMMARY 조회 (병렬)
        const detailed = await Promise.all(all.map(async p => {
          try {
            const detail = await axios.get(`/api/v1/products/${p.productId}`);
            const aiDesc = (detail.data.data.descriptions || []).find(d => d.attrKey === 'AI_SUMMARY');
            return { ...p, currentSummary: aiDesc ? aiDesc.attrValue : null, manualText: '', resultMsg: '', resultOk: false, loading: false };
          } catch {
            return { ...p, currentSummary: null, manualText: '', resultMsg: '', resultOk: false, loading: false };
          }
        }));

        s.adminProducts = detailed;
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function autoGenerateSummary(productId) {
      const p = s.adminProducts.find(x => x.productId === productId);
      if (!p) return;
      p.loading = true; p.resultMsg = '';
      try {
        const res = await axios.post(`/api/v1/admin/products/${productId}/ai-summary`, {});
        p.currentSummary = res.data.data.attrValue;
        p.resultMsg = '✓ AI 요약이 자동 생성되었습니다.';
        p.resultOk = true;
      } catch(e) {
        p.resultMsg = '✗ ' + (e?.response?.data?.message || 'AI 생성 실패. ANTHROPIC_API_KEY를 확인하세요.');
        p.resultOk = false;
      } finally { p.loading = false; }
    }

    async function manualSaveSummary(productId, summary) {
      if (!summary || !summary.trim()) return;
      const p = s.adminProducts.find(x => x.productId === productId);
      if (!p) return;
      p.loading = true; p.resultMsg = '';
      try {
        const res = await axios.post(`/api/v1/admin/products/${productId}/ai-summary`, { summary: summary.trim() });
        p.currentSummary = res.data.data.attrValue;
        p.manualText = '';
        p.resultMsg = '✓ 수동 저장이 완료되었습니다.';
        p.resultOk = true;
      } catch(e) {
        p.resultMsg = '✗ ' + (e?.response?.data?.message || '저장에 실패했습니다.');
        p.resultOk = false;
      } finally { p.loading = false; }
    }

    async function loadProducts() {
      loading.value = true;
      try {
        const res = await axios.get('/api/v1/products');
        s.products = res.data.data || [];
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function selectProduct(p) {
      s.selectedProduct = p;
      const res = await axios.get(`/api/v1/products/${p.productId}`);
      s.preferentialRates = res.data.data.preferentialRates || [];
      go('LOAN_APPLY_CONFIRM');
    }

    async function applyLoan() {
      loading.value = true; err.value = '';
      try {
        const res = await axios.post('/api/v1/loans/applications', { productId: s.selectedProduct.productId });
        s.loanAccountNo = res.data.data.loanAccountNo;
        s.expireAt      = res.data.data.expireAt;
        go('SUITABILITY_FORM');
      } catch(e) {
        const code = e?.response?.data?.code;
        if (code === 'LOAN002') {
          // 진행 중 신청서 조회 후 모달 표시
          try {
            const loansRes = await axios.get('/api/v1/customers/me/loans');
            const all = loansRes.data.data || [];
            inProgressLoan.value = all.find(l => isInProgress(l.statusCode)) || null;
            s.myLoans = all;
          } catch(_) {}
          showResumeModal.value = true;
        } else {
          setErr(e);
        }
      } finally { loading.value = false; }
    }

    async function submitSuitability() {
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/suitability`, {
          responses: [
            { questionCode: 'LOAN_PURPOSE',     question: '대출 목적은?',   answer: f.loanPurpose },
            { questionCode: 'REPAYMENT_METHOD', question: '상환 방법은?',   answer: f.repayMethod },
            { questionCode: 'ASSET_SCALE',      question: '자산 규모는?',   answer: f.assetScale },
            { questionCode: 'ANNUAL_INCOME',    question: '연간 소득은?',   answer: f.annualIncome },
          ]
        });
        go('VERIFY_SUITABILITY');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function verifySuitability() {
      if (!f.verifyPwd) { err.value='비밀번호를 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/verification/suitability`, { simplePassword: f.verifyPwd });
        f.verifyPwd = '';
        go('SUITABILITY_DONE');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function submitConsent() {
      if (!f.consent1 || !f.consent2) { err.value='필수 항목에 모두 동의해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/mydata-consent`, {
          consents: [
            { consentType: 'ADMIN_INFO', dataProvider: '행정안전부' },
            { consentType: 'MYDATA_USE', dataProvider: '공공마이데이터포털' },
          ]
        });
        go('DOC_ADMIN_VIEW');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function viewDoc(docType, nextStep) {
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/documents/${docType}/view?productId=${s.selectedProduct.productId}`);
        go(nextStep);
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function agreeDoc(docType, nextStep) {
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/documents/${docType}/agree`);
        go(nextStep);
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function doPreSign() {
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/signatures`, {
          signStep: 'PRE_PROCESS', signType: 'SIMPLE_CERT',
          tokenId: 'SIMPLE_TOKEN_PRE', originalValue: '사전절차 전자서명 동의',
        });
        go('MOBILE_AUTH_TERMS');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function agreeMobileTerms() {
      if (!f.mobileTerms) { err.value='약관에 동의해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/documents/MOBILE_AUTH_TERMS/view?productId=${s.selectedProduct.productId}`);
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/documents/MOBILE_AUTH_TERMS/agree`);
        go('TOKEN_SELECT');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function issueToken() {
      if (!f.certPwd) { err.value='비밀번호를 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        const res = await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/signatures/token`, { signType: f.signType });
        s.tokenId = res.data.data.tokenId;
        f.certPwd = '';
        go('INCOME_INPUT');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function submitIncome() {
      if (!f.companyName) { err.value='회사명을 입력해 주세요'; return; }
      if (!f.incomeMan || f.incomeMan <= 0) { err.value='연간소득을 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/income`, {
          companyName: f.companyName, jobType: f.jobType,
          employmentType: f.employmentType, annualIncome: f.incomeMan * 10000,
        });
        const res = await axios.get(`/api/v1/loans/applications/${s.loanAccountNo}/mydata`);
        s.mydataResult = res.data.data;
        go('MYDATA_VIEW');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function doScreening() {
      loading.value = true; err.value = '';
      try {
        const res = await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/screening`);
        s.maxLimitAmt      = res.data.data.maxLimitAmt;
        s.appliedBaseRate  = res.data.data.appliedBaseRate;
        s.screeningResult  = res.data.data.result;
        go('SCREENING_RESULT');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function loadDescriptions() {
      loading.value = true; err.value = '';
      try {
        const res = await axios.get(`/api/v1/products/${s.selectedProduct.productId}/descriptions`);
        s.productDescriptions = res.data.data || [];
        go('PRODUCT_DESC_1');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function submitContractTerms() {
      if (!f.termProduct || !f.termDesc || !f.termBond) { err.value='필수 약관에 모두 동의해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/contract/terms`, {
          documentTypes: ['PRODUCT_TERMS', 'PRODUCT_DESCRIPTION', 'BOND_CONTRACT'],
        });
        go('CONTRACT_TERMS_2');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function submitConditions() {
      const amt = (f.loanAmtMan || 0) * 10000;
      if (amt <= 0) { err.value='신청 금액을 입력해 주세요'; return; }
      if (amt > s.maxLimitAmt) { err.value=`최대 한도(${fmtMoney(s.maxLimitAmt)})를 초과했습니다`; return; }
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/contract/conditions`, {
          repaymentType: f.repaymentType,
          rateTypeCode: f.rateTypeCode,
          rateChangeCycle: f.rateTypeCode === 'V' ? f.rateChangeCycle : null,
          loanPeriod: f.loanPeriod,
          depositAccountNo: s.accountNo,
          fundPurpose: f.fundPurpose,
          loanAmount: amt,
          preferentialIds: f.prefIds,
        });
        const res2 = await axios.get(`/api/v1/loans/applications/${s.loanAccountNo}/contract/confirm`);
        s.confirmData = res2.data.data;
        go('CONFIRM_INFO');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function doContractSign() {
      loading.value = true; err.value = '';
      try {
        await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/verification/contract`, {
          signStep: 'CONTRACT', signType: f.signType,
          tokenId: s.tokenId, originalValue: '약정 전자서명',
        });
        go('BOND_CONTRACT');
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    async function executeLoan() {
      if (!f.finalPwd) { err.value='비밀번호를 입력해 주세요'; return; }
      loading.value = true; err.value = '';
      try {
        const res = await axios.post(`/api/v1/loans/applications/${s.loanAccountNo}/execute`, { simplePassword: f.finalPwd });
        s.execResult = res.data.data;
        f.finalPwd = '';
        hist.value = [];
        step.value = 'LOAN_DONE';
        err.value = '';
      } catch(e) { setErr(e); } finally { loading.value = false; }
    }

    function resetAll() {
      Object.assign(s, {
        email:'', name:'', phoneNo:'', birthDate:'', address:'',
        simplePassword:'', accountPassword:'', signaturePassword:'',
        customerId:null, accountNo:'', products:[], selectedProduct:null,
        loanAccountNo:'', expireAt:'', tokenId:'',
        maxLimitAmt:0, appliedBaseRate:0, screeningResult:'',
        mydataResult:null, productDescriptions:[], preferentialRates:[],
        confirmData:null, execResult:null,
      myAccount:null, myLoans:[], loanDetail:null, adminProducts:[],
      });
      Object.assign(f, {
        code:'', p1:'', p2:'', a1:'', a2:'', s1:'', s2:'',
        verifyPwd:'', certPwd:'', finalPwd:'',
        consent1:true, consent2:true, docAdminAgree:false, docPersonalAgree:false,
        mobileTerms:false, signType:'COMMON_CERT',
        loanPurpose:'생활비', repayMethod:'원리금균등', assetScale:'1억 이하', annualIncome:'3천~5천만원',
        companyName:'', jobType:'금융업', employmentType:'정규직', incomeMan:4500,
        termProduct:false, termDesc:false, termBond:false,
        repaymentType:'원리금균등', prefIds:[], loanAmtMan:1000,
        rateTypeCode:'F', rateChangeCycle:'6개월', loanPeriod:'36개월', fundPurpose:'생활비',
      });
      hist.value = [];
      err.value = '';
      step.value = 'LOGIN';
    }

    return {
      step, hist, err, loading, s, f, title,
      go, goBack, fmtPhone, fmtBirth, fmtAccount, fmtMoney, fmtDateShort, calcPrefSum, togglePref,
      statusBadgeStyle, isInProgress, inProgressLoans,
      showResumeModal, inProgressLoan,
      doResumeLoan, doStartFresh, doResumeLoanDirect,
      sendCode, verifyCode, setSimplePwd, setAccountPwd, doRegister,
      doLogin, loadMyPage, loadMyLoans, loadLoanDetail,
      goToMyPage, goToApply, goToMyLoans, goToLoanDetail,
      goToAiSummaryAdmin, loadAdminProducts, autoGenerateSummary, manualSaveSummary,
      loadProducts, selectProduct, applyLoan,
      submitSuitability, verifySuitability, submitConsent,
      viewDoc, agreeDoc, doPreSign, agreeMobileTerms, issueToken,
      submitIncome, doScreening, loadDescriptions,
      submitContractTerms, submitConditions, doContractSign, executeLoan, resetAll,
    };
  }
}).mount('#app');
</script>
</body>
</html>
