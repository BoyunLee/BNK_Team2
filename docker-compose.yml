# BNK 여신상품몰 — 프론트(nginx) + 백엔드(Spring Boot) 컨테이너.
# MySQL 은 기존 GCP 컨테이너(34.47.80.185:3306)를 그대로 사용한다.
#
#   docker compose build && docker compose up -d
#
# DB 접속정보는 아래 기본값을 쓰거나, 루트에 .env 파일 또는 셸 환경변수로 덮어쓴다.
services:
  backend:
    image: "${REGISTRY:-local}/bnk-backend:latest"
    build: ./BackEnd
    container_name: bnk-backend
    # 시크릿/접속정보는 루트 .env 에서 컨테이너 환경변수로 주입(평문 하드코딩 제거).
    # application-local.yml 의 ${DB_PASSWORD} ${CRYPTO_SECRET_KEY} ${GEMINI_API_KEY} 등으로 해석됨.
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: "local"
    expose:
      - "8080" # 외부 노출 없이 compose 내부망에서만 접근(프론트 nginx 가 프록시)
    restart: unless-stopped

  frontend:
    image: "${REGISTRY:-local}/bnk-frontend:latest"
    build: ./FrontEnd
    container_name: bnk-frontend
    depends_on:
      - backend
    ports:
      - "80:80" # 공개 포트 — GCP 방화벽에서 tcp:80 허용 필요
    restart: unless-stopped
