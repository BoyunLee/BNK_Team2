# 운영용 nginx — Cloudflare(엣지 TLS) 뒤에서 Origin Certificate 로 종단간 암호화(Full strict).
# docker-compose.prod.yml 이 이 파일과 인증서 디렉터리(../certs)를 컨테이너에 마운트한다.
# 로컬 개발은 기존 nginx.conf(평문 80)를 그대로 사용 — 이 파일은 운영 오버레이에서만 적용됨.

# HTTP(80) → HTTPS(443) 영구 리다이렉트 (Cloudflare "Always Use HTTPS" 와 이중 안전장치)
server {
    listen 80;
    server_name bnk.nextrplue.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name bnk.nextrplue.dev;

    # Cloudflare Origin Certificate (대시보드: SSL/TLS → Origin Server → Create Certificate)
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    # .mjs(ES 모듈) MIME — pdf.js 워커가 모듈 워커로 로드되므로 필수
    location ~ \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }

    # 정적 자산 + SPA 라우팅(새로고침 대비 index.html 폴백)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 는 백엔드 컨테이너로 프록시 → 브라우저 입장에선 동일 출처(CORS 불필요, 세션쿠키 유지)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # 이 블록에선 https → 백엔드가 https 인지
    }

    # PDF 등 대용량 정적파일 캐시(선택)
    location ~* \.(pdf|png|jpg|jpeg|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }
}
