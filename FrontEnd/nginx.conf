server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # .mjs(ES 모듈) MIME — pdf.js 워커가 모듈 워커로 로드되므로 필수
    location ~ \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }

    # 정적 자산 + SPA 라우팅(새로고침 대비 index.html 폴백)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 는 백엔드 컨테이너로 프록시 → 브라우저 입장에선 동일 출처(CORS 불필요, 세션쿠키 유지)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PDF 등 대용량 정적파일 캐시(선택)
    location ~* \.(pdf|png|jpg|jpeg|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }
}
